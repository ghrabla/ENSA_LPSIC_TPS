<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Users Management App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="spinner" class="spinner-overlay" role="status" aria-live="polite">
    <div class="spinner"></div>
    <span class="spinner-text">Loading…</span>
  </div>


  <nav class="navbar">
    <div class="navbar-inner">

      <a href="dashboard.html" class="navbar-brand">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0
               004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0
               -1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0
               018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375
               6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375
               3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625
               2.625 0 015.25 0z"/>
        </svg>
        Users Management
      </a>

      <div class="navbar-user">
        <div class="user-avatar" id="nav-user-avatar">U</div>
        <span id="nav-user-email"></span>
        <button id="logout-btn" class="btn btn-ghost btn-sm">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0
                 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0
                 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
          </svg>
          Logout
        </button>
      </div>

    </div>
  </nav>


  <main class="page-content">

    <div class="page-header">
      <div>
        <h2>Users</h2>
        <p>Manage your users — create, view, update, and delete records.</p>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value" id="total-count">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Current Page</div>
        <div class="stat-value" id="page-indicator" style="font-size:1rem;padding-top:0.4rem;">—</div>
      </div>
    </div>

    <div id="users-alert"></div>

    <div class="card" style="margin-bottom:1.25rem;">
      <div class="card-header">
        <h3>
          <svg style="display:inline;vertical-align:-3px;width:18px;height:18px;stroke:var(--primary);"
               fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0
                 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375
                 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0
                 -4.512-.645-6.374-1.766z"/>
          </svg>
          Add New User
        </h3>
      </div>

      <div class="card-body">
        <form id="add-user-form" novalidate>
          <div class="inline-form">

            <div class="form-group">
              <label for="add-first-name">First Name</label>
              <input type="text" id="add-first-name" placeholder="John" required />
              <span class="field-error" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label for="add-last-name">Last Name</label>
              <input type="text" id="add-last-name" placeholder="Doe" required />
              <span class="field-error" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label for="add-email">Email</label>
              <input type="email" id="add-email" placeholder="john@example.com" required />
              <span class="field-error" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label for="add-job">Job / Role</label>
              <input type="text" id="add-job" placeholder="Designer" required />
              <span class="field-error" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label style="visibility:hidden;">Action</label>
              <button type="submit" class="btn btn-success">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
                Add User
              </button>
            </div>

          </div>
        </form>
      </div>
    </div>


    <div class="card">
      <div class="card-header">
        <h3>
          <svg style="display:inline;vertical-align:-3px;width:18px;height:18px;stroke:var(--primary);"
               fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75
                 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0
                 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375
                 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375
                 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0
                 .375.375 0 01.75 0z"/>
          </svg>
          All Users
        </h3>

        <div class="search-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
          </svg>
          <input type="search" id="search-input"
                 class="form-group input"
                 placeholder="Search by name or email…"
                 style="margin:0;border:1.5px solid var(--border);
                        border-radius:var(--radius);padding:.55rem .75rem
                        .55rem 2.25rem;font-size:.875rem;outline:none;
                        transition:border-color .2s,box-shadow .2s;width:100%;"
                 autocomplete="off" />
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>ID</th>
              <th class="email-col">Email</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
          </tbody>
        </table>

        <div id="empty-state" class="empty-state" style="display:none;">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.182 16.318A4.486 4.486 0 0012.016 15a4.486 4.486 0
                 00-3.198 1.318M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9.75
                 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9
                 9.375 9s.375.336.375.75zm-.375 0h.008v.015h-.008V9.75zm5.625
                 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375
                 -.75.375.336.375.75zm-.375 0h.008v.015h-.008V9.75z"/>
          </svg>
          <p>No users found. Try a different search term or add a new user.</p>
        </div>

      </div>

      <div id="pagination" class="pagination"
           style="padding:1rem;border-top:1px solid var(--border);">
      </div>

    </div>

  </main>


  <div id="edit-modal" class="modal-backdrop" role="dialog"
       aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="modal">

      <div class="modal-header">
        <h3 id="edit-modal-title">Edit User</h3>
        <button class="modal-close" aria-label="Close modal">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <form id="edit-user-form" novalidate>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
            <div class="form-group">
              <label for="edit-first-name">First Name</label>
              <input type="text" id="edit-first-name" required />
              <span class="field-error" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label for="edit-last-name">Last Name</label>
              <input type="text" id="edit-last-name" required />
              <span class="field-error" aria-live="polite"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="edit-email">Email</label>
            <input type="email" id="edit-email" required />
            <span class="field-error" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label for="edit-job">Job / Role</label>
            <input type="text" id="edit-job" />
            <span class="field-error" aria-live="polite"></span>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button type="button" id="edit-cancel-btn" class="btn btn-ghost">Cancel</button>
        <button type="submit" id="edit-submit-btn" class="btn btn-primary"
                form="edit-user-form">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652
                 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8
                 -2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/>
          </svg>
          Save Changes
        </button>
      </div>

    </div>
  </div>


  <script src="auth.js"></script>
  <script src="users.js"></script>

</body>
</html>
