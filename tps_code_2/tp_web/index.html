<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Users Management App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

<div class="login-card">

    <div class="login-logo">
      <div class="logo-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25
               2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25
               2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
        </svg>
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to access Users Management</p>
    </div>

    <div class="hint-box">
      <strong>🔑 Test Credentials</strong>
      Email: <code>eve.holt@reqres.in</code><br>
      Password: <code>cityslicka</code><br><br>
      <em>or</em><br><br>
      Email: <code>admin@demo.com</code><br>
      Password: <code>password123</code>
    </div>

    <div id="login-alert"></div>

    <form id="login-form" novalidate>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          spellcheck="false"
          value="eve.holt@reqres.in"
        />
        <span class="field-error" aria-live="polite"></span>
      </div>

      <div class="form-group">
        <label for="password">
          Password
          <button type="button" id="toggle-password"
                  style="float:right;font-size:0.78rem;font-weight:500;
                         color:var(--primary);background:none;border:none;
                         cursor:pointer;padding:0;">
            Show
          </button>
        </label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          value="cityslicka"
        />
        <span class="field-error" aria-live="polite"></span>
      </div>

      <button type="submit" id="login-btn" class="btn btn-primary btn-block"
              style="margin-top:0.5rem;">
        Sign In
      </button>

    </form>

    <!-- Footer note -->
    <p style="text-align:center;margin-top:1.5rem;font-size:0.78rem;color:var(--text-muted);">
      Powered by
      <a href="https://reqres.in" target="_blank" rel="noopener"
         style="color:var(--primary);text-decoration:none;">reqres.in</a>
      · Demo Application
    </p>

  </div>

  <script src="auth.js"></script>
  <script>

    redirectIfAuthenticated();

    document.getElementById('login-form')
            .addEventListener('submit', handleLogin);

    (function () {
      const toggleBtn = document.getElementById('toggle-password');
      const pwdInput  = document.getElementById('password');

      toggleBtn.addEventListener('click', () => {
        const isPassword = pwdInput.type === 'password';
        pwdInput.type       = isPassword ? 'text' : 'password';
        toggleBtn.textContent = isPassword ? 'Hide' : 'Show';
      });
    })();
  </script>

</body>
</html>
