server {
  listen 80;
  server_name developer.donelocal.com;
  root /var/www/monorepo/developer/public;
  index index.php index.html;
  charset utf-8;
  client_max_body_size 128M;
  access_log  /var/log/nginx/access.log main buffer=16k;
  error_log   /var/log/nginx/error.log;
  # Handle Laravel routes for everything else
  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }

  location ~ \.php$ {
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_index   index.php;
    fastcgi_pass    done_php83:9000;
    try_files       $uri =404;
    fastcgi_param   SCRIPT_FILENAME    $document_root$fastcgi_script_name;
    fastcgi_param   SCRIPT_NAME        $fastcgi_script_name;
    include         fastcgi_params;
    include /etc/nginx/snippets/cors.conf;
  }

  location ~ /\.(ht|svn|git) {
    deny all;
  }
  # Handle VitePress documentation
  location /docs {
    alias /var/www/monorepo/docs-dist;
    try_files $uri $uri/ $uri.html /docs/index.html;
    
    # Ensure correct MIME types for JS files
    location ~* \.js$ {
      add_header Content-Type application/javascript;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
    
    # Handle CSS files
    location ~* \.css$ {
      add_header Content-Type text/css;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}